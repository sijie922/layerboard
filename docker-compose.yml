version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: layerboard-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: layerboard

  redis:
    image: redis:7-alpine
    container_name: layerboard-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: layerboard-server
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/layerboard
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-layerboard-prod-secret-change-me}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongodb
      - redis

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    container_name: layerboard-client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server

volumes:
  mongo_data:
  redis_data:
